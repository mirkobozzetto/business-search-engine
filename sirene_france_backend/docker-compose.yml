services:
  postgres:
    image: postgres:15
    container_name: sirene_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - sirene_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: sirene_redis
    ports:
      - "6380:6379"
    volumes:
      - sirene_redis_data:/data
    command: redis-server --appendonly yes

volumes:
  sirene_postgres_data:
  sirene_redis_data:
